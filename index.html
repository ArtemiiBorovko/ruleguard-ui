<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleGuard AI Compliance</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0A0A0C;
            --card-bg: #16161A;
            --card-border: #24242B;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --accent-color: #30D158; /* Эппловский зеленый */
            --accent-hover: #24B346;
            --input-bg: #202024;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s ease;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input, textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(48, 209, 88, 0.15);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(48, 209, 88, 0.2);
            margin-top: 8px;
        }

        .btn-submit:active {
            transform: scale(0.98);
            background-color: var(--accent-hover);
        }

        /* Анимация появления элементов */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🛡️ RuleGuard AI</h1>
            <p>Global Legal & Compliance Audit</p>
        </div>

        <div class="card">
            <!-- Шаг 1: География -->
            <div class="form-group">
                <label for="country">Страна бизнеса / Country</label>
                <select id="country" onchange="updateBusinessForms()">
                    <option value="USA">United States (USA)</option>
                    <option value="Russia">Россия (Russia)</option>
                    <option value="Other">Другая страна / Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Штат, Область, Город / Location details</label>
                <input type="text" id="location" placeholder="e.g. California, Los Angeles or Спб">
            </div>

            <!-- Шаг 2: Форма Лица (Динамическая) -->
            <div class="form-group">
                <label for="biz_form">Форма компании / Legal Entity</label>
                <select id="biz_form">
                    <!-- Будет заполнено через JavaScript под выбранную страну -->
                </select>
            </div>

            <!-- Шаг 3: Свободное описание -->
            <div class="form-group">
                <label for="description">Суть бизнеса и специфика / Business Details</label>
                <textarea id="description" placeholder="Опишите продукт, продажи, сотрудников или просто напишите 'У меня кофейня с 2 сотрудниками' — AI разберется в свободной форме."></textarea>
            </div>

            <button class="btn-submit" onclick="assembleAndSend()">Запустить аудит рисков</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Настройка стилей заголовка окна Телеграма в тон нашему приложению
        tg.setHeaderColor('#0A0A0C');
        tg.setBackgroundColor('#0A0A0C');

        // Списки форм бизнеса для разных стран
        const forms = {
            USA: [
                { value: 'LLC', text: 'LLC (Limited Liability Company)' },
                { value: 'C-Corp', text: 'C-Corporation' },
                { value: 'S-Corp', text: 'S-Corporation' },
                { value: 'Sole Proprietorship', text: 'Sole Proprietorship' },
                { value: 'Unregistered', text: 'Not registered yet' }
            ],
            Russia: [
                { value: 'ИП', text: 'ИП (Индивидуальный предприниматель)' },
                { value: 'ООО', text: 'ООО (Общество с огр. ответственностью)' },
                { value: 'Самозанятый', text: 'Самозанятость (НПД)' },
                { value: 'АО', text: 'АО / ПАО' },
                { value: 'Нет регистрации', text: 'Еще не зарегистрирован' }
            ],
            Other: [
                { value: 'Individual', text: 'Individual Entrepreneur / Freelancer' },
                { value: 'Corporate', text: 'Corporate Entity / Company' },
                { value: 'Unregistered', text: 'Unregistered Business' }
            ]
        };

        function updateBusinessForms() {
            const country = document.getElementById('country').value;
            const formSelect = document.getElementById('biz_form');
            formSelect.innerHTML = '';

            forms[country].forEach(item => {
                const option = document.createElement('option');
                option.value = item.value;
                option.text = item.text;
                formSelect.appendChild(option);
            });
        }

        function assembleAndSend() {
            const country = document.getElementById('country').value;
            const location = document.getElementById('location').value.trim();
            const bizForm = document.getElementById('biz_form').value;
            const description = document.getElementById('description').value.trim();

            if (!location) {
                alert('Пожалуйста, укажите локацию (город/штат)!');
                return;
            }

            // Формируем структурированный JSON-пакет для нашего Python-бота
            const payload = {
                country: country,
                location: location,
                legal_form: bizForm,
                business_details: description || "Не указано детально"
            };

            try {
                // Отправляем собранную анкету в виде одной JSON строки
                tg.sendData(JSON.stringify(payload));
                setTimeout(() => { tg.close(); }, 100);
            } catch (error) {
                alert('Ошибка отправки: ' + error.message);
            }
        }

        // Первичная инициализация при открытии страницы
        updateBusinessForms();
    </script>
</body>
</html>
