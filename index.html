<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleGuard AI 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0A0A0C;
            --card-bg: #16161A;
            --card-border: #24242B;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --accent-color: #30D158;
            --accent-hover: #24B346;
            --input-bg: #202024;
            --tab-bg: #111115;
        }

        [data-theme="light"] {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --card-border: #E5E5EA;
            --text-main: #000000;
            --text-muted: #636366;
            --accent-color: #34C759;
            --accent-hover: #28CD41;
            --input-bg: #E5E5EA;
            --tab-bg: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            margin-bottom: 14px;
        }

        /* ТЕЛЕГРАМ-СТИЛЬ ДЛЯ ЮРИДИЧЕСКОГО ЧАТА */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.45;
            white-space: pre-line;
            animation: msgFade 0.2s ease forwards;
        }

        .msg.assistant {
            background-color: var(--card-bg);
            border-left: 3px solid var(--accent-color);
            align-self: flex-start;
            color: var(--text-main);
        }

        .msg.user {
            background-color: var(--accent-color);
            color: #000000;
            align-self: flex-end;
            font-weight: 500;
        }

        .chat-input-box {
            display: flex;
            gap: 8px;
            align-items: center;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 6px 8px;
            border-radius: 12px;
        }

        .chat-input-box input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            padding: 8px;
            font-size: 14px;
            outline: none;
        }

        .btn-send {
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--tab-bg); border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px)) 0;
            z-index: 1000;
        }
        
        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; width: 25%;
        }
        .tab-item i { font-size: 20px; }
        .tab-item.active { color: var(--accent-color); }

        .app-screen { display: none; }
        .app-screen.active { display: flex; flex-direction: column; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        select, input, textarea {
            width: 100%; box-sizing: border-box; background-color: var(--input-bg);
            border: 1px solid var(--card-border); border-radius: 10px; padding: 12px;
            color: var(--text-main); font-size: 14px; outline: none;
        }
        textarea { resize: none; height: 80px; }
        
        .btn-submit {
            background-color: var(--accent-color); color: #000000; font-weight: 700;
            border: none; border-radius: 12px; padding: 14px; font-size: 14px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-submit:disabled { opacity: 0.6; }

        .spinner {
            display: none; width: 16px; height: 16px;
            border: 2px solid #000000; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes msgFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-radar" class="app-screen active">
            <div class="card" style="text-align: center; padding: 12px;">
                <h3 style="margin: 0; font-size: 18px; color: var(--accent-color);">🛡️ RuleGuard Compliance Radar</h3>
                <p style="color: var(--text-muted); margin: 4px 0 0 0; font-size: 12px;">Операционный контроль рисков (Техас / РФ)</p>
            </div>

            <div class="card" style="flex: 1; display: flex; flex-direction: column; padding: 12px;">
                <div class="chat-container" id="chat-flow">
                    <div class="msg assistant">Загрузка контекста безопасности из PostgreSQL...</div>
                </div>

                <div class="chat-input-box">
                    <input type="text" id="mini-chat-input" placeholder="Задать уточняющий вопрос по законам..." onkeypress="handleChatKey(event)">
                    <button class="btn-send" onclick="sendMiniAppMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <button class="btn-submit" id="refresh-analysis-btn" onclick="triggerFastReanalysis()">
                <div class="spinner" id="refresh-spinner"></div>
                <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i> <span>Полный пересчет рисков 2026</span>
            </button>
        </div>

        <div id="screen-profile" class="app-screen">
            <div class="card">
                <h3 style="margin: 0 0 4px 0;">Параметры бизнеса</h3>
                <p style="color: var(--text-muted); font-size: 12px; margin: 0 0 12px 0;">Смена локации полностью переключает ИИ на законы этой страны</p>
                
                <div class="form-group">
                    <label>Страна ведения деятельности</label>
                    <select id="country" onchange="updateBusinessForms()">
                        <option value="USA">United States (USA)</option>
                        <option value="Russia">Россия (РФ)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Регион / Штат / Город</label>
                    <input type="text" id="location" placeholder="Например: Texas, Dallas">
                </div>

                <div class="form-group">
                    <label>Организационно-правовая форма</label>
                    <select id="biz_form"></select>
                </div>

                <div class="form-group">
                    <label>Детализация операций и активов</label>
                    <textarea id="description" placeholder="Пример: Moving business, 3 трака, нанимаем контракторов по W-2/1099, возим коммерческие грузы..."></textarea>
                </div>

                <button class="btn-submit" id="submit-btn" onclick="saveProfileData()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Сохранить бизнес-профиль
                </button>
            </div>
        </div>

        <div id="screen-archive" class="app-screen">
            <div class="card">
                <h3 style="margin: 0;">Архив скоринг-отчетов</h3>
            </div>
            <div id="archive-list"></div>
        </div>

        <div id="screen-settings" class="app-screen">
            <div class="card">
                <h3>Системные опции</h3>
                <div class="form-group">
                    <label>Время утреннего радара</label>
                    <input type="time" id="push_time" value="09:00" onchange="updatePushTimeOnServer()">
                </div>
                <button class="btn-submit" style="margin-top: 10px;" onclick="toggleTheme()">Переключить тему оформления</button>
            </div>
        </div>

    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-radar" onclick="switchScreen('screen-radar', this)">
            <i class="fa-solid fa-shield-halved"></i> Главная
        </div>
        <div class="tab-item" id="tab-profile" onclick="switchScreen('screen-profile', this)">
            <i class="fa-solid fa-briefcase"></i> Профиль
        </div>
        <div class="tab-item" id="tab-archive" onclick="switchScreen('screen-archive', this)">
            <i class="fa-solid fa-box-archive"></i> Архив
        </div>
        <div class="tab-item" id="tab-settings" onclick="switchScreen('screen-settings', this)">
            <i class="fa-solid fa-gear"></i> Опции
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://ruleguard-backend.onrender.com";
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userTelegramId = tg.initDataUnsafe?.user?.id || 542709522; 
        const userTelegramName = tg.initDataUnsafe?.user?.first_name || "Предприниматель";

        function switchScreen(screenId, tabElement) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (tabElement) tabElement.classList.add('active');
        }

        function loadTheme() {
            if (localStorage.getItem('ruleguard_theme') === 'light') {
                document.body.setAttribute('data-theme', 'light');
                tg.setHeaderColor('#F2F2F7');
            } else {
                document.body.removeAttribute('data-theme');
                tg.setHeaderColor('#0A0A0C');
            }
        }

        function toggleTheme() {
            if (document.body.hasAttribute('data-theme')) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('ruleguard_theme', 'dark');
                tg.setHeaderColor('#0A0A0C');
            } else {
                document.body.setAttribute('data-theme', 'light');
                localStorage.setItem('ruleguard_theme', 'light');
                tg.setHeaderColor('#F2F2F7');
            }
        }

        const forms = {
            USA: [{value:'LLC', text:'LLC (Limited Liability Company)'}, {value:'C-Corp', text:'C-Corp'}, {value:'Sole Prop', text:'Sole Proprietorship'}],
            Russia: [{value:'ИП', text:'ИП (Индивидуальный предприниматель)'}, {value:'ООО', text:'ООО'}, {value:'Самозанятый', text:'Самозанятость (НПД)'}]
        };

        function updateBusinessForms() {
            const country = document.getElementById('country').value;
            const formSelect = document.getElementById('biz_form');
            formSelect.innerHTML = '';
            forms[country].forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.value; opt.text = item.text;
                formSelect.appendChild(opt);
            });
        }

        function loadDataFromServer() {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            fetch(`${BACKEND_URL}/api/history/${userTelegramId}?tz=${encodeURIComponent(tz)}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    if (data.push_time) document.getElementById('push_time').value = data.push_time;
                    const chatFlow = document.getElementById('chat-flow');
                    chatFlow.innerHTML = '';
                    
                    if (data.history && data.history.length > 0) {
                        // Выводим последний сгенерированный юридический отчет как первое сообщение ассистента
                        chatFlow.innerHTML = `<div class="msg assistant"><b>📋 Последний сохраненный аудит рисков:</b>\n\n${data.history[0].report_text}</div>`;
                        renderArchive(data.history);
                    } else {
                        chatFlow.innerHTML = `<div class="msg assistant">Привет! Ваш бизнес-профиль еще не настроен. Перейдите во вкладку <b>Профиль</b>, укажите параметры (например, США, Даллас, Мувинг) для проведения первого ИИ-анализа законодательства 2026 года.</div>`;
                    }
                }
            }).catch(() => {
                document.getElementById('chat-flow').innerHTML = '<div class="msg assistant">⚠️ Не удалось подключиться к облачной базе данных PostgreSQL.</div>';
            });
        }

        // 🔥 ПРОБЛЕМА №1 (ИСПРАВЛЕНО): Фронтенд больше не делает двойной вызов генерации при сохранении анкеты
        function saveProfileData() {
            const payload = {
                user_id: userTelegramId,
                username: userTelegramName,
                country: document.getElementById('country').value,
                location: document.getElementById('location').value.trim(),
                legal_form: document.getElementById('biz_form').value,
                business_details: document.getElementById('description').value.trim(),
                push_time: document.getElementById('push_time').value,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone 
            };

            if (!payload.location) return alert('Пожалуйста, заполните локацию компании!');

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            fetch(`${BACKEND_URL}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                if (data.status === 'success') {
                    // После сохранения анкеты мы просто запускаем пересчет отчета
                    triggerFastReanalysis();
                    switchScreen('screen-radar', document.getElementById('tab-radar'));
                }
            }).catch(() => { btn.disabled = false; });
        }

        function triggerFastReanalysis() {
            const btn = document.getElementById('refresh-analysis-btn');
            const spinner = document.getElementById('refresh-spinner');
            const icon = document.getElementById('refresh-icon');
            
            btn.disabled = true; spinner.style.display = 'block'; icon.style.display = 'none';
            document.getElementById('chat-flow').innerHTML = '<div class="msg assistant">🔄 <i>ИИ RuleGuard делает глубокий поисковый запрос актуальных регуляторных изменений на июль 2026 года...</i></div>';

            fetch(`${BACKEND_URL}/api/reanalyze/${userTelegramId}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') loadDataFromServer();
            })
            .finally(() => {
                btn.disabled = false; spinner.style.display = 'none'; icon.style.display = 'inline-block';
            });
        }

        // 💬 ОТПРАВКА СООБЩЕНИЯ В ЧАТ ВНУТРИ MINI APP (НОВАЯ ФИЧА)
        function sendMiniAppMessage() {
            const input = document.getElementById('mini-chat-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            const chatFlow = document.getElementById('chat-flow');
            
            // Рендерим реплику пользователя
            chatFlow.innerHTML += `<div class="msg user">${text}</div>`;
            chatFlow.scrollTop = chatFlow.scrollHeight;

            // Лоадер ответа
            const loaderId = "loader-" + Date.now();
            chatFlow.innerHTML += `<div class="msg assistant" id="${loaderId}"><i class="fa-solid fa-ellipsis fa-bounce"></i> Думаю над юрисдикцией...</div>`;
            chatFlow.scrollTop = chatFlow.scrollHeight;

            fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userTelegramId, message: text })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById(loaderId).remove();
                if (data.status === 'success') {
                    chatFlow.innerHTML += `<div class="msg assistant">${data.reply}</div>`;
                } else {
                    chatFlow.innerHTML += `<div class="msg assistant">⚠️ Ошибка обработки: ${data.message}</div>`;
                }
                chatFlow.scrollTop = chatFlow.scrollHeight;
            }).catch(() => {
                document.getElementById(loaderId).remove();
                chatFlow.innerHTML += `<div class="msg assistant">⚠️ Ошибка соединения с сервером.</div>`;
            });
        }

        function handleChatKey(e) { if (e.key === 'Enter') sendMiniAppMessage(); }

        function renderArchive(historyArray) {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            historyArray.forEach(item => {
                list.innerHTML += `
                    <div class="card">
                        <h5 style="margin:0 0 6px 0; color:var(--accent-color);">📋 Отчет: ${item.created_at}</h5>
                        <div style="font-size:13px; max-height:120px; overflow-y:auto; white-space:pre-line; color:var(--text-muted);">${item.report_text}</div>
                    </div>
                `;
            });
        }

        function updatePushTimeOnServer() {
            fetch(`${BACKEND_URL}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userTelegramId, push_time: document.getElementById('push_time').value })
            });
        }

        updateBusinessForms();
        loadTheme();
        loadDataFromServer();
    </script>
</body>
</html>
