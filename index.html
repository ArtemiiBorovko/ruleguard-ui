<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleGuard UI MVP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        .card {
            background-color: #2c2c2e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #48484a;
            background-color: #3a3a3c;
            color: white;
            font-size: 16px;
        }
        button {
            background-color: #34c759;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 95%;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛡️ Анкета RuleGuard</h2>
        <p>Опишите ваш бизнес, чтобы ИИ рассчитал юридические риски:</p>
        <input type="text" id="business_input" placeholder="Например: Кофейня на вынос, Спб">
        <button onclick="sendDataToBot()">Запустить анализ рисков</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function sendDataToBot() {
            const text = document.getElementById('business_input').value;
            if (!text) {
                alert('Введите описание бизнеса!');
                return;
            }
            
            // Проверенный метод отправки данных для любых платформ
            try {
                tg.sendData(text);
                // Если приложение не закрылось автоматически, закрываем его через полсекунды
                setTimeout(() => { tg.close(); }, 100);
            } catch (error) {
                alert('Ошибка отправки: ' + error.message);
            }
        }
    </script>
</body>
</html>
