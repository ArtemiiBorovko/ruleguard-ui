<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleGuard AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0A0A0C;
            --card-bg: #16161A;
            --card-border: #24242B;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --accent-color: #30D158;
            --accent-hover: #24B346;
            --input-bg: #202024;
            --tab-bg: #111115;
        }

        [data-theme="light"] {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --card-border: #E5E5EA;
            --text-main: #000000;
            --text-muted: #636366;
            --accent-color: #34C759;
            --accent-hover: #28CD41;
            --input-bg: #E5E5EA;
            --tab-bg: #FFFFFF;
        }

        [data-theme="light"] .btn-submit, 
        [data-theme="light"] .theme-switch-box button {
            color: #FFFFFF !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container { width: 100%; max-width: 420px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease forwards;
        }

        .radar-box { text-align: center; padding: 20px 0; }
        
        .app-logo {
            width: 62px;
            height: 75px;
            object-fit: cover;
            margin: 0 auto 16px auto;
            border-radius: 12px;
            display: block;
        }
        
        .radar-box h3 { margin: 0 0 8px 0; font-size: 20px; font-weight: 600; color: var(--text-main); }
        .radar-box p { margin: 0; font-size: 14px; color: var(--text-muted); line-height: 1.5; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 14px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        
        input[type="text"], input[type="file"], input[type="time"], select {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus, select:focus, input[type="time"]:focus {
            border-color: var(--accent-color);
        }

        /* --- Стили для сетки дней уведомлений --- */
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 4px;
        }
        .checkbox-grid > :nth-child(1), .checkbox-grid > :nth-child(9) {
            grid-column: 1 / -1; 
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px !important;
            color: var(--text-main) !important;
            text-transform: none;
            font-weight: 500 !important;
            background: var(--input-bg);
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: border-color 0.2s ease;
        }
        .checkbox-label:hover { border-color: var(--accent-color); }
        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            margin: 0;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: #0A0A0C;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:active { transform: scale(0.98); }
        
        .chat-box { background: var(--input-bg); border-radius: 12px; padding: 12px; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        .chat-message { padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; line-height: 1.4; }
        .bot-msg { background: var(--card-bg); align-self: flex-start; border: 1px solid var(--card-border); color: var(--text-main); }
        .user-msg { background: var(--accent-color); color: #0A0A0C; align-self: flex-end; }
        
        .chat-input-row { display: flex; gap: 8px; align-items: center; }
        .chat-input-row button {
            background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 12px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: var(--text-main); cursor: pointer;
        }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--tab-bg); border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; padding: 12px 0 24px 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; cursor: pointer; flex: 1; transition: color 0.2s ease; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--accent-color); }
        
        .screen { display: none; width: 100%; }
        .screen.active { display: flex; flex-direction: column; }
        
        .archive-item { background: var(--input-bg); border-radius: 12px; padding: 16px; border: 1px solid var(--card-border); display: flex; flex-direction: column; gap: 10px; }
        
        .theme-switch-box { display: flex; background: var(--input-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); }
        .theme-switch-box button { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-main); font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .theme-switch-box button.active { background: var(--accent-color); color: #0A0A0C !important; }

        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper i { position: absolute; left: 14px; color: var(--text-muted); font-size: 16px; }
        .search-wrapper input { padding-left: 42px; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">

    <!-- Экран 1: Главный (Чат) -->
    <div id="screen-main" class="screen active">
        <div class="card radar-box">
            <img src="https://i.ibb.co/6c2rks2t/b0ab7579-2af5-4f33-b1d5-bc4412354c46.jpg" alt="Логотип RuleGuard AI" class="app-logo">
            <h3>Ваш ИИ-Ассистент</h3>
            <p>Загрузите договор для анализа или отправьте голосовое сообщение с вопросом.</p>
        </div>

        <div class="card">
            <div class="chat-box" id="chatHistory">
                <div class="chat-message bot-msg">Здравствуйте! Загрузите договор в формате PDF или напишите ваш вопрос, и я проверю его на риски.</div>
            </div>
            
            <div class="chat-input-row">
                <button onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-paperclip"></i></button>
                <input type="file" id="fileUpload" style="display: none;" accept=".pdf,.doc,.docx" onchange="handleFileUpload()">
                <input type="text" id="chatInput" placeholder="Введите сообщение..." onkeypress="handleEnter(event)">
                <button onclick="startVoiceRecord()" id="voiceBtn"><i class="fa-solid fa-microphone"></i></button>
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Экран 2: Архив (Отчеты) -->
    <div id="screen-archive" class="screen">
        <div class="card">
            <div class="form-group">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="archive-search-input" placeholder="Поиск по названию бизнеса..." oninput="filterArchive()">
                </div>
            </div>
            <div id="archive-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                <!-- Сюда динамически загружаются отчеты -->
            </div>
        </div>
    </div>

    <!-- Экран 3: Настройки (Профиль и тема) -->
    <div id="screen-options" class="screen">
        <div class="card">
            <div class="form-group">
                <label><i class="fa-solid fa-building"></i> Название бизнеса</label>
                <input type="text" id="business_name" placeholder="Например: ООО Ромашка">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-clipboard-check"></i> Кратко о бизнесе и целях</label>
                <input type="text" id="business_context" placeholder="Опишите сферу и главные задачи...">
            </div>
            <button class="btn-submit" onclick="saveProfileData()">Сохранить профиль</button>
        </div>

        <div class="card">
            <div class="form-group">
                <label><i class="fa-solid fa-clock"></i> Время пуш-уведомлений</label>
                <input type="time" id="push_time" value="10:00" onchange="updatePushSettingsOnServer()">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-calendar-days"></i> Дни уведомлений</label>
                <div class="checkbox-grid">
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="everyday" onchange="handleDaysLogic(this)"> Каждый день</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="mon" onchange="handleDaysLogic(this)"> Понедельник</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="tue" onchange="handleDaysLogic(this)"> Вторник</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="wed" onchange="handleDaysLogic(this)"> Среда</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="thu" onchange="handleDaysLogic(this)"> Четверг</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="fri" onchange="handleDaysLogic(this)"> Пятница</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="sat" onchange="handleDaysLogic(this)"> Суббота</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="sun" onchange="handleDaysLogic(this)"> Воскресенье</label>
                    <label class="checkbox-label"><input type="checkbox" name="push_days" value="monthly" onchange="handleDaysLogic(this)"> Раз в месяц</label>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label><i class="fa-solid fa-palette"></i> Оформление приложения</label>
                <div class="theme-switch-box">
                    <button id="btn-theme-dark" class="active" onclick="setTheme('dark')"><i class="fa-solid fa-moon"></i> Темная</button>
                    <button id="btn-theme-light" onclick="setTheme('light')"><i class="fa-solid fa-sun"></i> Светлая</button>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Нижняя навигация -->
<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('main', this)">
        <i class="fa-solid fa-brain"></i>
        <span>Ассистент</span>
    </div>
    <div class="nav-item" onclick="switchTab('archive', this)">
        <i class="fa-solid fa-circle-check"></i>
        <span>Архив</span>
    </div>
    <div class="nav-item" onclick="switchTab('options', this)">
        <i class="fa-solid fa-sliders"></i>
        <span>Опции</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userTelegramId = tg.initDataUnsafe?.user?.id || 123456789;
    const userTelegramName = tg.initDataUnsafe?.user?.first_name || "TestUser";
    const BACKEND_URL = 'https://ruleguard-backend.onrender.com';

    let currentArchiveData = [];

    window.onload = () => {
        loadDataFromServer();
        loadArchiveFromServer();
        
        const savedTheme = localStorage.getItem('appTheme') || 'dark';
        setTheme(savedTheme);
    };

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`screen-${tabId}`).classList.add('active');
        el.classList.add('active');

        if (tabId === 'archive') loadArchiveFromServer();
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('appTheme', theme);
        
        document.getElementById('btn-theme-dark').classList.remove('active');
        document.getElementById('btn-theme-light').classList.remove('active');
        document.getElementById(`btn-theme-${theme}`).classList.add('active');

        if (theme === 'dark') {
            tg.setHeaderColor('#0A0A0C');
            tg.setBackgroundColor('#0A0A0C');
        } else {
            tg.setHeaderColor('#F2F2F7');
            tg.setBackgroundColor('#F2F2F7');
        }
    }

    function addMessage(text, isUser = false) {
        const box = document.getElementById('chatHistory');
        const msg = document.createElement('div');
        msg.className = `chat-message ${isUser ? 'user-msg' : 'bot-msg'}`;
        msg.innerHTML = text; // Используем innerHTML для поддержки иконок внутри сообщений
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
        return msg; // Возвращаем элемент для возможности обновления (например, спиннера)
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // Логика чекбоксов дней
    function handleDaysLogic(changedCheckbox) {
        const checkboxes = document.querySelectorAll('input[name="push_days"]');
        const val = changedCheckbox.value;
        const isChecked = changedCheckbox.checked;

        if (isChecked) {
            if (val === 'everyday' || val === 'monthly') {
                checkboxes.forEach(cb => {
                    if (cb !== changedCheckbox) cb.checked = false;
                });
            } else {
                checkboxes.forEach(cb => {
                    if (cb.value === 'everyday' || cb.value === 'monthly') cb.checked = false;
                });
            }
        }
        updatePushSettingsOnServer(); 
    }

    function getSelectedDays() {
        const checkboxes = document.querySelectorAll('input[name="push_days"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, true);
        input.value = '';

        try {
            const response = await fetch(`${BACKEND_URL}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_id: userTelegramId,
                    username: userTelegramName,
                    prompt: text
                })
            });
            const data = await response.json();
            addMessage(data.reply || "Ответ получен.");
        } catch (error) {
            addMessage("<i class='fa-solid fa-triangle-exclamation'></i> Ошибка связи с сервером.");
        }
    }

    function handleFileUpload() {
        const fileInput = document.getElementById('fileUpload');
        const file = fileInput.files[0];
        if (!file) return;

        addMessage(`Файл отправлен: ${file.name}`, true);
        const botMsg = addMessage("<i class='fa-solid fa-inbox'></i> Читаю и анализирую ваш договор...");

        setTimeout(() => {
            botMsg.innerHTML = "Анализ файла завершен. Найдены 3 потенциальных риска в пунктах о конфиденциальности. Сохраняю отчет в архив.";
        }, 2000);
        fileInput.value = '';
    }

    function startVoiceRecord() {
        const btn = document.getElementById('voiceBtn');
        btn.style.color = '#FF453A'; 
        
        setTimeout(() => {
            btn.style.color = 'var(--text-main)';
            addMessage("Аудиосообщение отправлено", true);
            const botMsg = addMessage("<i class='fa-solid fa-microphone-lines'></i> Расшифровываю аудио...");
            
            setTimeout(() => {
                botMsg.innerHTML = "Голосовой запрос обработан. Подготовил краткую сводку по вашему вопросу.";
            }, 1500);
        }, 2000);
    }

    async function saveProfileData() {
        const bName = document.getElementById('business_name').value;
        const bCtx = document.getElementById('business_context').value;
        const pTime = document.getElementById('push_time').value;
        const pDays = getSelectedDays();

        tg.HapticFeedback.impactOccurred('medium');

        try {
            await fetch(`${BACKEND_URL}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userTelegramId,
                    username: userTelegramName,
                    business_name: bName,
                    business_context: bCtx,
                    push_time: pTime,
                    push_days: pDays
                })
            });
            tg.showAlert("Профиль успешно сохранен!");
        } catch (error) {
            tg.showAlert("Ошибка при сохранении.");
        }
    }

    async function updatePushSettingsOnServer() {
        const pTime = document.getElementById('push_time').value;
        const pDays = getSelectedDays();

        try {
            await fetch(`${BACKEND_URL}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userTelegramId,
                    username: userTelegramName,
                    push_time: pTime,
                    push_days: pDays,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            });
        } catch (error) {
            console.error("Error saving push setup:", error);
        }
    }

    async function loadDataFromServer() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/history/${userTelegramId}`);
            if (response.ok) {
                const data = await response.json();
                if (data.business_name) document.getElementById('business_name').value = data.business_name;
                if (data.business_context) document.getElementById('business_context').value = data.business_context;
                if (data.push_time) document.getElementById('push_time').value = data.push_time;
                
                if (data.push_days && Array.isArray(data.push_days)) {
                    const checkboxes = document.querySelectorAll('input[name="push_days"]');
                    checkboxes.forEach(cb => {
                        cb.checked = data.push_days.includes(cb.value);
                    });
                }
            }
        } catch (e) {
            console.error("No profile history found yet.");
        }
    }

    async function loadArchiveFromServer() {
        const list = document.getElementById('archive-list');
        list.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:14px;"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка...</p>';
        try {
            const response = await fetch(`${BACKEND_URL}/api/history/${userTelegramId}`);
            if (response.ok) {
                const data = await response.json();
                currentArchiveData = data.reports || [];
                renderArchive();
            } else {
                list.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:14px;">Архив пока пуст.</p>';
            }
        } catch (e) {
            list.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:14px;">Ошибка загрузки архива.</p>';
        }
    }

    function filterArchive() {
        renderArchive(document.getElementById('archive-search-input').value.toLowerCase());
    }

    function renderArchive(filterText = "") {
        const list = document.getElementById('archive-list');
        list.innerHTML = '';
        
        let filtered = currentArchiveData;
        if (filterText) {
            filtered = currentArchiveData.filter(item => 
                (item.business_name && item.business_name.toLowerCase().includes(filterText)) ||
                (item.summary && item.summary.toLowerCase().includes(filterText))
            );
        }

        if (!filtered || filtered.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:14px;">Ничего не найдено.</p>';
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'archive-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <h5 style="margin:0; font-size:15px; color:var(--accent-color); font-weight:600;"><i class="fa-regular fa-clipboard"></i> Отчет от ${item.created_at || 'Недавний'}</h5>
                        <span style="font-size:13px; color:var(--text-muted);"><i class="fa-solid fa-building"></i> ${item.business_name || 'Не указан'}</span>
                    </div>
                </div>
                <p style="margin:0; font-size:14px; line-height:1.5; color:var(--text-main);">${item.summary || 'Краткое содержание отчета отсутствует.'}</p>
                <button style="align-self:flex-start; background:transparent; border:1px solid var(--card-border); color:var(--text-main); padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer;" onclick="tg.showAlert('Функция скачивания в разработке')"><i class="fa-solid fa-download"></i> Скачать PDF</button>
            `;
            list.appendChild(div);
        });
    }
</script>

</body>
</html>
